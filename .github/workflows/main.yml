name: Bus Booking CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: busbooking_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "./backend/package-lock.json"

      - name: Install dependencies
        run: npm ci --no-audit --legacy-peer-deps --ignore-scripts
        timeout-minutes: 10

      - name: Create .env file
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/busbooking_test" >> .env
          echo "JWT_SECRET=test-secret-key" >> .env
          echo "PORT=5000" >> .env

          # E kopjojmë skedarin .env edhe brenda folderit prisma që ORM ta lexojë pa asnjë dështim
          mkdir -p prisma
          cp .env prisma/.env

      - name: Setup Database
        run: |
          npx prisma migrate deploy
          npx prisma generate
        env:
          # Kalojmë variablën direkt edhe si variabël mjedisi në procesin e GitHub Actions
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/busbooking_test

      - name: Run Vitest
        run: npm run test:run
